<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f5f5f5;
}

/* HERO HEADER */
.hero {
  height: 100vh;
  /* background: url('your-image.jpg') center/cover no-repeat; */
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* overlay fade */
.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.6);
}

/* hero content */
.hero-content {
  position: relative;
  text-align: center;
  color: #fff;
}

.hero-content h1 {
  font-size: 40px;
  letter-spacing: 5px;
  color: #ffffff;
}

.hero-content p {
  margin-top: 15px;
  letter-spacing: 4px;
  font-size: 18px;
  color: #ffffff;
}

.hero-btn {
  margin-top: 25px;
  padding: 12px 30px;
  border-radius: 25px;
  border: none;
  background: rgba(0,0,0,0.5);
  color: #fff;
  cursor: pointer;
}

/* NAVBAR */
.navbar {
  position: absolute;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  color: #000;
  z-index: 2;
}

.nav-links {
  display: flex;
  gap: 30px;
  list-style: none;
}

.nav-links li {
  cursor: pointer;
}

/* MAIN CONTAINER */
.container {
  display: flex;
  gap: 30px;
  padding: 30px;
}

/* FORM SECTION */
.form-section {
  flex: 1.5;
  background: #eee;
  padding: 25px;
  border-radius: 15px;
}

.form-row {
  display: flex;
  gap: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 20px;
  border: none;
  border-radius: 10px;
  background: #fff;
}

textarea {
  height: 100px;
}

.radio-group {
  display: flex;
  gap: 40px;
  margin-bottom: 20px;
}

.submit-btn {
  background: black;
  color: white;
  padding: 10px 25px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* IMAGE SECTION */
.image-section {
  flex: 1;
  border-radius: 20px;
  background: url(Telephone.jpg) center/cover no-repeat;
}
</style>
</head>

<body>

<!-- HERO HEADER -->
<div style="margin-bottom:50px;">

  <!-- NAVBAR ON TOP -->
  <div class="navbar">
    <div><b>AR</b></div>

    <ul class="nav-links">
      <li class="navbar-item">
            <a href="#home" class="navbar-link" data-nav-link>Home</a>
          </li>

          <li class="navbar-item">
            <a href="#gallery" class="navbar-link" data-nav-link>Gallery</a>
          </li>

          <li class="navbar-item">
            <a href="#about" class="navbar-link" data-nav-link>About</a>
          </li>

          <li class="navbar-item">
            <a href="#services" class="navbar-link" data-nav-link>Services</a>
          </li>

          <li class="navbar-item">
            <a href="#portfolio" class="navbar-link" data-nav-link>Portfolio</a>
          </li>

          <li class="navbar-item">
            <a href="contact_us.html" class="navbar-link" data-nav-link>Contact us</a>
          </li>
    </ul>
  </div>

  

</div>

<!-- MAIN -->
<div class="container">

  <!-- FORM -->
  <div class="form-section">

    <div class="form-row">
      <div>
        <label>First Name</label>
        <input type="text" placeholder="Your First Name">
      </div>

      <div>
        <label>Last Name</label>
        <input type="text" placeholder="Your Last Name">
      </div>
    </div>

    <label>Email Address</label>
    <input type="email" placeholder="Your Email Address">

    <label>Phone Number</label>
    <input type="text" placeholder="Your Phone Number">

    <div class="form-row">
      <div>
        <label>Event Date</label>
        <input type="date">
      </div>

      <div>
        <label>Location of the wedding</label>
        <input type="text" placeholder="City, Venue, etc.">
      </div>
    </div>

    <label>Estimated Guest Count</label>
    <input type="number" placeholder="E.g., 200">

    <label>What services are you looking for?</label>
    <div class="radio-group">
      <label><input type="radio" name="service"> Photography</label>
      <label><input type="radio" name="service"> Films</label>
      <label><input type="radio" name="service"> Both</label>
    </div>

    <label>Tell us more about your wedding</label>
    <textarea placeholder="Event flow, venues, timings, etc."></textarea>

    <button class="submit-btn">Submit</button>

  </div>

  <!-- SIDE IMAGE -->
  <div class="image-section"></div>

</div>

</body>
</html>
