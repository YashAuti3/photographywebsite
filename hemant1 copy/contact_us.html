<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f5f5f5;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #fff;
}

.nav-links {
  display: flex;
  gap: 30px;
  list-style: none;
}

.nav-links li {
  cursor: pointer;
  color: #666;
}

.contact-btn {
  background: #ff4d4d;
  color: #fff;
  padding: 8px 20px;
  border-radius: 20px;
}

/* MAIN CONTAINER */
.container {
  display: flex;
  gap: 30px;
  padding: 30px;
}

/* FORM SECTION */
.form-section {
  flex: 1.5;
  background: #eee;
  padding: 25px;
  border-radius: 15px;
}

.form-row {
  display: flex;
  gap: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 20px;
  border: none;
  border-radius: 10px;
  background: #fff;
}

textarea {
  height: 100px;
}

label {
  font-size: 14px;
}

/* RADIO */
.radio-group {
  display: flex;
  gap: 160px;
  margin-bottom: 20px;
}

.submit-btn {
  background: black;
  color: white;
  padding: 10px 25px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* IMAGE SECTION */
.image-section {
  flex: 1;
  border-radius: 20px;
  background: url(Telephone.jpg) center/cover no-repeat;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div><b>AR</b></div>

  <ul class="nav-links">
    <li>Home</li>
    <li>Films</li>
    <li>Services</li>
    <li>Blogs</li>
    <li>About</li>
  </ul>

  <div class="contact-btn">Contact</div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- FORM -->
  <div class="form-section">

    <div class="form-row">
      <div>
        <label>First Name</label>
        <input type="text" placeholder="Your First Name">
      </div>

      <div>
        <label>Last Name</label>
        <input type="text" placeholder="Your Last Name">
      </div>
    </div>

    <label>Email Address</label>
    <input type="email" placeholder="Your Email Address">

    <label>Phone Number</label>
    <input type="text" placeholder="Your Phone Number">

    <div class="form-row">
      <div>
        <label>Event Date</label>
        <input type="date">
      </div>

      <div>
        <label>Location of the wedding</label>
        <input type="text" placeholder="City, Venue, etc.">
      </div>
    </div>

    <label>Estimated Guest Count</label>
    <input type="number" placeholder="E.g., 200">

    <label>What services are you looking for?</label>
    <div class="radio-group">
      <label><input type="radio" name="service"> Photography</label>
      <label><input type="radio" name="service"> Films</label>
      <label><input type="radio" name="service"> Both Photography and Film</label>
    </div>

    <label>Tell us more about your wedding</label>
    <textarea placeholder="Event flow, venues, timings, etc."></textarea>

    <button class="submit-btn">Submit</button>

  </div>

  
<div class="image-section">
</div>

</body>
</html>
