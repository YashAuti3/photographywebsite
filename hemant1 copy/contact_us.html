<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photography Contact</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    background: #f5f5f5;
  }

  /* Navbar */
  .navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 50px;
    background: white;
    align-items: center;
  }

  .navbar h2 {
    font-weight: bold;
  }

  .nav-links a {
    margin: 0 15px;
    text-decoration: none;
    color: #555;
  }

  .contact-btn {
    background: #ff4d4d;
    color: white;
    padding: 8px 18px;
    border-radius: 20px;
  }

  /* Main Container */
  .main {
    display: flex;
    width: 90%;
    margin: 30px auto;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  }

  /* Left Form */
  .form-section {
    flex: 1;
    padding: 30px;
  }

  .form-row {
    display: flex;
    gap: 15px;
  }

  .form-group {
    width: 100%;
    margin-bottom: 15px;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
  }

  input:focus {
    border-color: #ff4d4d;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #ff4d4d;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background: #e60000;
  }

  /* Right Image */
  .image-section {
    flex: 1;
    background: url('https://images.unsplash.com/photo-1512499617640-c2f999098c01') center/cover no-repeat;
  }

  /* Responsive */
  @media(max-width: 900px) {
    .main {
      flex-direction: column;
    }

    .image-section {
      height: 250px;
    }

    .form-row {
      flex-direction: column;
    }
  }
  /* .image-section {
  flex: 1;
} */

/* .image-section img {
  width: 100%;
  height: 100%;
  object-fit: cover;
} */

</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <h2>A</h2>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Films</a>
    <a href="#">Services</a>
    <a href="#">Blogs</a>
    <a href="#">About</a>
    <a href="#" class="contact-btn">Contact</a>
  </div>
</div>

<!-- Main Section -->
<div class="main">

  <!-- Form -->
  <div class="form-section">

    <div class="form-row">
      <div class="form-group">
        <input type="text" placeholder="First Name">
      </div>
      <div class="form-group">
        <input type="text" placeholder="Last Name">
      </div>
    </div>

    <div class="form-group">
      <input type="email" placeholder="Email Address">
    </div>

    <div class="form-group">
      <input type="tel" placeholder="Phone Number">
    </div>

    <div class="form-row">
      <div class="form-group">
        <input type="date">
      </div>
      <div class="form-group">
        <input type="text" placeholder="Location">
      </div>
    </div>

    <div class="form-group">
      <input type="number" placeholder="Estimated Guest Count">
    </div>

   <a href="submit.html">
  <button type="button">Submit</button>
</a>

  </div>

  <!-- Image -->
  <div class="image-section">
  <img style="max-width:450px; height:450px;" src="abc.webp" alt="contact image">
</div>
</body>
</html>
